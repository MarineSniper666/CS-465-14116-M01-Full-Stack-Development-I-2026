<div class="container mt-4">
  <h2>Edit Trip</h2>

  <<form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Trip Name</label>
      <input
        type="text"
        class="form-control"
        name="name"
        [(ngModel)]="trip.name">
    </div>

    <div class="mb-3">
      <label class="form-label">Image</label>
      <input
        type="text"
        class="form-control"
        name="image"
        [(ngModel)]="trip.image">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea
        class="form-control"
        rows="5"
        name="description"
        [(ngModel)]="trip.description"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Update Trip</button>
  </form>
</div>
